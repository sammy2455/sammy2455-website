<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo: rounded square con el accent color -->
  <rect width="32" height="32" rx="7" fill="#0071e3"/>

  <!-- Chevron ">" -->
  <path
    d="M7.5 11 L13.5 16 L7.5 21"
    stroke="white"
    stroke-width="2.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Underscore "_" (cursor parpadeante conceptual) -->
  <line
    x1="16.5" y1="21.5"
    x2="24.5" y2="21.5"
    stroke="white"
    stroke-width="2.6"
    stroke-linecap="round"
  />
</svg>
